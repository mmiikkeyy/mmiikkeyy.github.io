<!DOCTYPE html>
<html>
<head>
	<title>Licznik</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="text/javascript">
		var count = 0;
		var highestCount = 0;
		document.addEventListener("click", function() {
			count++;
			if (count > highestCount) {
				highestCount = count;
				document.getElementById("highest-score").innerHTML = "Highest CPS score: " + highestCount;
				document.getElementById("highest-score").classList.add("score-animation");
				setTimeout(function(){
					document.getElementById("highest-score").classList.remove("score-animation");
				}, 1000);
			}
			document.getElementById("counter").innerHTML = count;
			setTimeout(function(){ 
				count--;
				document.getElementById("counter").innerHTML = count;
			}, 1000);
		});
		// ustawienie początkowego tekstu
		document.addEventListener("DOMContentLoaded", function() {
			document.getElementById("highest-score").innerHTML = "Highest CPS score: " + highestCount;
		});
	</script>
	<style type="text/css">
		body {
			font-family: 'Open Sans', sans-serif;
			height: 100vh;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			margin: 0;
			background-color: #191927;
		}
		#counter {
			font-size: 48px;
			text-align: center;
			margin: 0 auto;
			color: #9393a7;
			user-select: none;
		}
		#highest-score {
			font-size: 24px;
			text-align: center;
			margin-top: 20px;
			color: #9393a7;
			font-family: 'Roboto', sans-serif;
			user-select: none;
		}
		.score-animation {
			animation-name: scoreAnimation;
			animation-duration: 1s;
			animation-iteration-count: 1;
			animation-timing-function: ease-in-out;
		}
		@keyframes scoreAnimation {
			0% {
				transform: translateY(0);
			}
			25% {
				transform: translateY(-5px);
			}
			75% {
				transform: translateY(5px);
			}
			100% {
				transform: translateY(0);
			}
		}
		@font-face {
			font-family: 'Open Sans';
			src: url('https://fonts.googleapis.com/css2?family=Open+Sans&display=swap');
		}
		@font-face {
			font-family: 'Roboto';
			src: url('https://fonts.googleapis.com/css2?family=Roboto&display=swap');
		}
	</style>
</head>
<body>
	<div id="counter">0</div>
	<div id="highest-score">Highest CPS score: 0</div>
</body>
</html>
